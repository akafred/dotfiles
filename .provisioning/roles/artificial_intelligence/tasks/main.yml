- name: Install Github Copilot CLI
  npm:
    name: "@github/copilot"
    global: true
    state: absent

- name: Install AI tools (casks)
  homebrew_cask:
    name:
      - antigravity
      - chatgpt
      - claude
      - claude-code
      - codex
      - copilot-cli
      - opencode-desktop
      - superset

- name: Tap anomalyco/tap
  homebrew_tap:
    name: anomalyco/tap

- name: Install AI tools (formulae)
  homebrew:
    name:
      - anomalyco/tap/opencode

- name: add entries to .gitignore_global
  lineinfile:
    dest: "{{ ansible_env.HOME }}/.gitignore_global"
    line: "{{ item }}"
  with_items:
    - .serena/

- name: remove entries from .gitignore_global
  lineinfile:
    dest: "{{ ansible_env.HOME }}/.gitignore_global"
    line: "{{ item }}"
    state: absent
  with_items:
    - .claude/
    - CLAUDE.md
    - AGENTS.md
