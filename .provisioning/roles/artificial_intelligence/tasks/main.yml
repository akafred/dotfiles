- name: Install Github Copilot CLI
  npm:
    name: "@github/copilot"
    global: true
    state: absent

- name: Install AI tools (casks)
  homebrew_cask:
    name:
      - antigravity
      - chatgpt
      - chatgpt-classic
      - claude
      - claude-code
      - codex
      - copilot-cli
      - opencode-desktop
      - superset

- name: Tap anomalyco/tap
  homebrew_tap:
    name: anomalyco/tap

- name: Install AI tools (formulae)
  homebrew:
    name:
      - anomalyco/tap/opencode

- name: add entries to .gitignore_global
  lineinfile:
    dest: "{{ ansible_env.HOME }}/.gitignore_global"
    line: "{{ item }}"
  with_items:
    - .serena/
    - .claude/settings.local.json

- name: remove entries from .gitignore_global
  lineinfile:
    dest: "{{ ansible_env.HOME }}/.gitignore_global"
    line: "{{ item }}"
    state: absent
  with_items:
    - .claude/
    - CLAUDE.md
    - AGENTS.md

- name: Create Copilot OTEL directory
  file:
    path: "{{ ansible_env.HOME }}/.copilot/otel"
    state: directory
    mode: '0755'

# OTEL file export enables 'bunx ccusage copilot daily' to read usage from JSONL files
- name: Configure Copilot OTEL in shell
  blockinfile:
    dest: "{{ ansible_env.HOME }}/.paths_homes_etc"
    insertafter: EOF
    marker: "# {mark} ANSIBLE MANAGED BLOCK for copilot-otel"
    content: |
             export COPILOT_OTEL_ENABLED=true
             export COPILOT_OTEL_EXPORTER_TYPE=file
             export COPILOT_OTEL_FILE_EXPORTER_PATH="$HOME/.copilot/otel/copilot-otel-$(date +%Y%m%d-%H%M%S).jsonl"
